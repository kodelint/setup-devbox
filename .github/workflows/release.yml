name: Smart Release

on:
  push:
    branches: [main, development, "feature/**", "hotfix/**", "bugfix/**"]
  pull_request:
    branches: [main, development]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type (major, minor, patch)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Is this a prerelease?"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry run (no tags or releases created)"
        required: false
        type: boolean
        default: false

jobs:
  analyze:
    name: 🔍 Analyze & Version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      should_build: ${{ steps.decide.outputs.should_build }}
      new_version: ${{ steps.version.outputs.new_version }}
      is_prerelease: ${{ steps.decide.outputs.is_prerelease }}
      branch_type: ${{ steps.decide.outputs.branch_type }}
      release_type: ${{ steps.version.outputs.release_type }}
      is_manual: ${{ github.event_name == 'workflow_dispatch' }}
      is_dry_run: ${{ github.event.inputs.dry_run == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

      - name: Determine branch type
        id: decide
        run: |
          branch="${{ github.ref_name }}"
          echo "branch_type=other" >> $GITHUB_OUTPUT
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "should_release=false" >> $GITHUB_OUTPUT
          echo "is_prerelease=false" >> $GITHUB_OUTPUT

          if [[ "$branch" == "main" ]]; then
            echo "branch_type=main" >> $GITHUB_OUTPUT
          elif [[ "$branch" == "development" ]]; then
            echo "branch_type=development" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          elif [[ "$branch" == feature/* ]] || [[ "$branch" == hotfix/* ]] || [[ "$branch" == bugfix/* ]]; then
            echo "branch_type=feature" >> $GITHUB_OUTPUT
          fi

      - name: Calculate Version
        id: version
        run: |
          current_version=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_type="${{ github.event.inputs.release_type }}"
            should_release="true"
          else
            # Automated analysis
            commits=$(git log ${last_tag}..HEAD --oneline --grep="^feat" --grep="^fix" --grep="^bug" --grep="^build" --grep="^perf" --grep="^refactor" --grep="BREAKING CHANGE" || echo "")
            
            if [[ -z "$commits" ]]; then
              release_type="none"
              should_release="false"
            elif git log ${last_tag}..HEAD --grep="BREAKING CHANGE" | grep -q "BREAKING CHANGE"; then
              release_type="major"
              should_release="true"
            elif echo "$commits" | grep -q "feat:"; then
              release_type="minor"
              should_release="true"
            else
              release_type="patch"
              should_release="true"
            fi
          fi

          # Only release from main/development unless manual
          if [[ "${{ steps.decide.outputs.branch_type }}" == "other" || "${{ steps.decide.outputs.branch_type }}" == "feature" ]] && [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            should_release="false"
          fi

          # Predict new version using semver logic if cargo-release isn't available yet
          IFS='.' read -ra V <<< "${current_version/-*/}"
          major=${V[0]}; minor=${V[1]}; patch=${V[2]}
          
          case "$release_type" in
            major) new_version="$((major + 1)).0.0" ;;
            minor) new_version="${major}.$((minor + 1)).0" ;;
            patch) new_version="${major}.${minor}.$((patch + 1))" ;;
            *) new_version="$current_version" ;;
          esac

          if [[ "${{ steps.decide.outputs.is_prerelease }}" == "true" || "${{ github.event.inputs.prerelease }}" == "true" ]]; then
            new_version="${new_version}-beta.1"
          fi
          
          if [[ "${{ steps.decide.outputs.branch_type }}" == "feature" ]]; then
             short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
             new_version="${current_version}-dev.${short_sha}"
          fi

          echo "release_type=$release_type" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          if [[ "$should_release" == "true" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: 🔨 Build (${{ matrix.target }})
    needs: analyze
    if: needs.analyze.outputs.should_build == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          arch=$(echo ${{ matrix.target }} | cut -d'-' -f1)
          cp target/${{ matrix.target }}/release/setup-devbox setup-devbox-macos-$arch

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: setup-devbox-${{ matrix.target }}
          path: setup-devbox-macos-*
          retention-days: 5

  release:
    name: 🚀 Release
    needs: [analyze, build]
    if: needs.analyze.outputs.should_release == 'true' && needs.analyze.outputs.is_dry_run == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          pattern: setup-devbox-*
          merge-multiple: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install tools
        run: cargo install cargo-release git-cliff --locked

      - name: Bump Version & Changelog
        run: |
          new_ver="${{ needs.analyze.outputs.new_version }}"
          # Use cargo-release to update files but we handle the git part for robustness
          cargo release version $new_ver --execute --no-confirm
          git-cliff --tag v$new_ver > CHANGELOG.md
          
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore(release): $new_ver [skip ci]"
          git tag -a "v$new_ver" -m "Release v$new_ver"
          
          git push origin ${{ github.ref_name }}
          git push origin "v$new_ver"

      - name: Generate Release Notes
        run: git-cliff --tag v${{ needs.analyze.outputs.new_version }} --strip header --unreleased > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.analyze.outputs.new_version }}
          files: ./dist/setup-devbox-macos-*
          prerelease: ${{ needs.analyze.outputs.is_prerelease == 'true' }}
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
